services:
  - type: web
    name: planeamos-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py cargar_datos
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"